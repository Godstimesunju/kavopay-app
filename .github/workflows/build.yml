name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Create Flutter project
        run: flutter create --org com.kavopay --project-name kavopay temp_project

      - name: Copy our files into project
        run: |
          cp lib/main.dart temp_project/lib/main.dart
          cp pubspec.yaml temp_project/pubspec.yaml
          cp -r assets temp_project/assets
          cp android/app/src/main/AndroidManifest.xml temp_project/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        working-directory: temp_project
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: kavopay-release-apk
          path: temp_project/build/app/outputs/flutter-apk/app-release.apk
